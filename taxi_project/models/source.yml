version: 2

sources:
  - name: ny_taxi_source
    database: terraform-lab-ricardo
    schema: ny_taxi
    description: "Fonte de dados carregada no BigQuery pelo pipeline"

    tables:
      - name: daily_trip_metrics_auto
        description: "Tabela com métricas diárias de corridas"

        config:
          loaded_at_field: "cast(pickup_date as timestamp)"
          freshness:
            warn_after: {count: 3650, period: day}
            error_after: {count: 5000, period: day}

        columns:
          - name: pickup_date
            description: "Data de referência das métricas diárias"
            tests:
              - not_null